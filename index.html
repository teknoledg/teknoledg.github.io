<!DOCTYPE html>
<html>
<head>
    <title>Secure, live, personal data streams traded on PDX</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.onload = function() {
            var images = document.querySelectorAll('.ai-img');
            var index = 0;

            function toggleImages() {
                images.forEach((img, i) => {
                    if (i === index) {
                        img.style.opacity = 1;
                    } else {
                        img.style.opacity = 0;
                    }
                });
                index = (index + 1) % images.length;
            }

            function numberFlowSimulator() {
                var numberElement = document.createElement('span');
                numberElement.id = 'number-element';
                var numberText = document.createTextNode('1,106,021');
                numberElement.appendChild(numberText);
                document.getElementById('tagline-container').appendChild(numberElement);

                let speed = 1000;
                let increment = 1000;

                function updateNumber() {
                    let currentNumber = parseInt(numberText.textContent.replace(/,/g, ''));
                    currentNumber += increment;
                    let numberStr = currentNumber.toLocaleString();
                    numberText.textContent = numberStr;
                }

                setInterval(function() {
                    updateNumber();
                    speed = Math.floor(Math.random() * 1000) + 500;
                    increment = Math.floor(Math.random() * 1000) + 500;
                }, speed);
            }

            setTimeout(function() {
                setInterval(toggleImages, 2500);
                toggleImages();
                numberFlowSimulator();
            }, 2500);
        }
    </script>
    <style>
        .digit {
            display: inline-block;
            transition: opacity 1s;
        }

        @keyframes rollUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }

        @keyframes rollDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="fullscreen">
        <div class="logo-container">
            <img class="logo" src="images/teknoledge-holdings-white@0.5x.png" alt="Teknoledge Holdings">
            <div class="wrapper">
                <div id="tagline-container">
                    <span id="number-element"></span><span id="text-element"> Secure, Live, Personal Data Streams traded on PDX.</span>
                </div>
            </div>
        </div>
        <div class="ai-container">
            <img src="images/ai-selfie-1.png" alt="Image 1" class="ai-img" id="img1">
            <img src="images/ai-selfie-2.png" alt="Image 2" class="ai-img" id="img2">
        </div>
    </div>
</body>
</html>
